<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#7B9E87">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="A calming, mindful todo list for daily intentions">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Zen Todo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --sage: #7B9E87;
    --sage-light: rgba(123,158,135,0.12);
    --sage-faint: rgba(123,158,135,0.06);
    --earth: #C4956A;
    --earth-light: rgba(196,149,106,0.1);
    --sky: #8B9FC5;
    --lavender: #B8A0C8;
    --text: #3D4A42;
    --text-soft: #6B7B6E;
    --text-muted: #8B9E93;
    --text-faint: #B0B8A8;
    --bg1: #F5F0EB;
    --bg2: #EDE8E0;
    --glass: rgba(255,255,255,0.55);
    --glass-border: rgba(255,255,255,0.6);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', -apple-system, sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  html, body { 
    height: 100%; overflow-x: hidden;
    font-family: var(--sans); color: var(--text);
    background: linear-gradient(165deg, var(--bg1) 0%, var(--bg2) 50%, #E8E5DD 100%);
  }

  body { padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }

  /* ===== ANIMATIONS ===== */
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.8); opacity: 0.15; }
  }
  @keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    10% { opacity: 0.25; }
    90% { opacity: 0.05; }
    100% { transform: translateY(-90vh) scale(0); opacity: 0; }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes checkDraw {
    from { stroke-dashoffset: 14; }
    to { stroke-dashoffset: 0; }
  }
  @keyframes gentlePulse {
    0%, 100% { opacity: 0.65; }
    50% { opacity: 1; }
  }
  @keyframes celebrateBurst {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    50% { opacity: 1; }
    100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
  }
  @keyframes slideDown {
    from { opacity: 0; max-height: 0; transform: translateY(-8px); }
    to { opacity: 1; max-height: 200px; transform: translateY(0); }
  }
  @keyframes swipeOut {
    to { transform: translateX(120%); opacity: 0; }
  }

  /* ===== LAYOUT ===== */
  .app {
    min-height: 100vh; position: relative; overflow: hidden;
    max-width: 100%; padding-bottom: 100px;
  }
  .container {
    max-width: 480px; margin: 0 auto;
    padding: 40px 20px 40px;
    position: relative; z-index: 1;
  }

  /* ===== AMBIENT ===== */
  .particle {
    position: absolute; bottom: -10px;
    width: 4px; height: 4px; border-radius: 50%;
    background: rgba(123,158,135,0.2);
    pointer-events: none;
    animation: floatUp 10s ease-in infinite;
  }
  .blob {
    position: absolute; border-radius: 50%; pointer-events: none;
  }
  .blob-1 {
    top: -15%; right: -15%; width: 50vw; height: 50vw;
    background: radial-gradient(circle, rgba(123,158,135,0.08) 0%, transparent 70%);
  }
  .blob-2 {
    bottom: -10%; left: -15%; width: 40vw; height: 40vw;
    background: radial-gradient(circle, rgba(196,149,106,0.06) 0%, transparent 70%);
  }

  /* ===== HEADER ===== */
  .header { margin-bottom: 32px; animation: fadeInUp 0.8s ease-out; }
  .date-label {
    font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 6px; font-weight: 400;
  }
  .greeting {
    font-family: var(--serif); font-size: 30px; font-weight: 300;
    color: var(--text); line-height: 1.2;
  }
  .affirmation {
    font-family: var(--serif); font-size: 14px; font-style: italic;
    color: var(--text-muted); animation: gentlePulse 6s ease-in-out infinite;
    line-height: 1.5; margin-top: 14px;
  }

  /* ===== STREAK ===== */
  .streak-badge {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 14px; border-radius: 20px;
    background: var(--earth-light);
    font-size: 11px; letter-spacing: 0.8px; color: #8B7B6B;
    transition: all 0.5s ease; margin-top: 8px;
  }
  .streak-badge.empty { background: rgba(0,0,0,0.03); }
  .streak-icon { font-size: 14px; transition: filter 0.5s ease; }
  .streak-badge.empty .streak-icon { filter: grayscale(1); }

  /* ===== PROGRESS CARD ===== */
  .progress-card {
    display: flex; align-items: center; gap: 24px;
    padding: 24px; border-radius: 20px;
    background: var(--glass); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    margin-bottom: 24px;
    animation: fadeInUp 0.8s 0.15s ease-out both;
  }
  .progress-ring { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
  .progress-ring svg { transform: rotate(-90deg); }
  .progress-ring .count {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .progress-ring .num {
    font-family: var(--serif); font-size: 20px; font-weight: 300; color: var(--text);
  }
  .progress-ring .label {
    font-size: 9px; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase;
  }
  .progress-info { flex: 1; }
  .progress-status { font-size: 13px; color: var(--text-soft); margin-bottom: 8px; }
  .cat-pills { display: flex; gap: 10px; flex-wrap: wrap; }
  .cat-pill {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; opacity: 0.7;
  }
  .cat-pill-dot { width: 6px; height: 6px; border-radius: 50%; }
  .breathing-orb {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(123,158,135,0.4);
    animation: breathe 4s ease-in-out infinite;
    flex-shrink: 0;
  }

  /* ===== INPUT AREA ===== */
  .input-card {
    padding: 18px; border-radius: 20px;
    background: var(--glass); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    margin-bottom: 20px;
    animation: fadeInUp 0.8s 0.3s ease-out both;
  }
  .cat-selector { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .cat-btn {
    padding: 5px 12px; border-radius: 18px;
    border: 1px solid rgba(0,0,0,0.06);
    background: transparent; color: #999;
    font-size: 11px; letter-spacing: 0.4px;
    font-family: var(--sans); cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    -webkit-appearance: none;
  }
  .cat-btn:active { transform: scale(0.95); }
  .cat-btn.active {
    border-color: var(--cat-color);
    background: color-mix(in srgb, var(--cat-color) 8%, transparent);
    color: var(--cat-color);
  }
  .cat-btn-icon { margin-right: 4px; font-size: 9px; }

  .input-row { display: flex; gap: 10px; }
  .input-field {
    flex: 1; padding: 12px 16px; border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.06);
    background: rgba(255,255,255,0.6);
    font-size: 14px; font-family: var(--sans);
    color: var(--text); transition: border-color 0.3s ease;
    -webkit-appearance: none;
  }
  .input-field::placeholder { color: var(--text-faint); font-style: italic; }
  .input-field:focus { outline: none; border-color: rgba(123,158,135,0.3); }

  .add-btn {
    padding: 12px 20px; border-radius: 12px; border: none;
    background: var(--sage); color: white;
    font-size: 13px; font-family: var(--sans); font-weight: 500;
    letter-spacing: 0.5px; cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    -webkit-appearance: none;
  }
  .add-btn:active { transform: scale(0.95); background: #6B8E77; }

  /* ===== FILTERS ===== */
  .filters {
    display: flex; gap: 4px; margin-bottom: 14px;
    animation: fadeInUp 0.8s 0.45s ease-out both;
  }
  .filter-btn {
    padding: 6px 12px; border-radius: 8px; border: none;
    background: transparent; color: #AAA;
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    font-family: var(--sans); cursor: pointer;
    transition: all 0.3s ease; -webkit-appearance: none;
  }
  .filter-btn.active { background: var(--sage-light); color: #4A5D52; }

  /* ===== TODO ITEMS ===== */
  .todo-list { display: flex; flex-direction: column; gap: 8px; }

  .todo-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 14px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(0,0,0,0.05);
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
    cursor: pointer; position: relative;
    animation: fadeInUp 0.4s ease-out both;
    touch-action: pan-y;
    user-select: none; -webkit-user-select: none;
  }
  .todo-item.done {
    background: var(--sage-faint);
    border-color: rgba(123,158,135,0.12);
    opacity: 0.55;
  }
  .todo-item.swiping { transition: none; }
  .todo-item.removing { animation: swipeOut 0.35s ease-in forwards; }

  .checkbox {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid rgba(0,0,0,0.13);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .todo-item.done .checkbox {
    border-color: var(--cat-color);
    background: var(--cat-color);
  }
  .checkbox svg {
    stroke-dasharray: 14; stroke-dashoffset: 0;
    animation: checkDraw 0.4s ease-out;
  }

  .todo-cat-dot {
    width: 5px; height: 5px; border-radius: 50%;
    opacity: 0.5; flex-shrink: 0;
  }
  .todo-text {
    flex: 1; font-size: 14px; line-height: 1.4;
    color: var(--text); transition: all 0.4s ease;
  }
  .todo-item.done .todo-text {
    color: #A0A89D;
    text-decoration: line-through;
    text-decoration-color: rgba(123,158,135,0.3);
  }
  .delete-hint {
    font-size: 10px; color: #C88; letter-spacing: 0.5px;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
    position: absolute; right: 16px;
  }
  .todo-item.show-delete .delete-hint { opacity: 0.6; }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center; padding: 52px 20px;
    animation: fadeInUp 0.8s 0.5s ease-out both;
  }
  .empty-icon {
    font-size: 36px; margin-bottom: 14px;
    animation: breathe 4s ease-in-out infinite;
    display: inline-block;
  }
  .empty-title {
    font-family: var(--serif); font-size: 18px;
    color: var(--text-muted); font-style: italic; line-height: 1.6;
  }
  .empty-sub {
    font-size: 12px; color: var(--text-faint);
    margin-top: 6px; letter-spacing: 0.4px;
  }

  /* ===== COMPLETION ===== */
  .completion-card {
    text-align: center; padding: 28px 20px; margin-top: 16px;
    background: linear-gradient(135deg, var(--sage-faint), rgba(196,149,106,0.05));
    border-radius: 20px; animation: fadeInUp 0.8s ease-out;
  }
  .completion-title {
    font-family: var(--serif); font-size: 20px;
    color: #4A5D52; font-weight: 300; line-height: 1.5;
  }
  .completion-sub {
    font-size: 12px; color: var(--text-muted);
    margin-top: 6px; letter-spacing: 0.4px;
  }

  /* ===== CELEBRATION OVERLAY ===== */
  .celebration {
    position: fixed; inset: 0; pointer-events: none; z-index: 999;
    display: flex; align-items: center; justify-content: center;
  }
  .celebration span {
    position: absolute; font-size: 22px; opacity: 0;
    animation: celebrateBurst 1.6s ease-out forwards;
  }

  /* ===== FOOTER ===== */
  .footer-orb { text-align: center; margin-top: 44px; opacity: 0.35; }

  /* ===== INSTALL BANNER ===== */
  .install-banner {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    padding: 16px 20px; padding-bottom: calc(16px + var(--safe-bottom));
    background: rgba(255,255,255,0.92); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(0,0,0,0.06);
    display: flex; align-items: center; gap: 14px;
    animation: fadeInUp 0.6s ease-out;
  }
  .install-banner.hidden { display: none; }
  .install-text { flex: 1; }
  .install-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .install-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .install-btn {
    padding: 10px 18px; border-radius: 10px; border: none;
    background: var(--sage); color: white; font-size: 12px;
    font-family: var(--sans); font-weight: 500; cursor: pointer;
    -webkit-appearance: none;
  }
  .install-dismiss {
    background: none; border: none; color: #AAA;
    font-size: 18px; cursor: pointer; padding: 4px;
    -webkit-appearance: none;
  }

  /* ===== HAPTIC-LIKE VISUAL FEEDBACK ===== */
  @media (hover: hover) {
    .todo-item:hover { transform: translateX(3px); }
    .cat-btn:hover { transform: scale(1.06); }
    .add-btn:hover { background: #6B8E77; transform: scale(1.03); }
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(123,158,135,0.2); border-radius: 3px; }
</style>
</head>

<body>
<div id="app"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>

<script>
const { useState, useEffect, useRef, useCallback, createElement: h, Fragment } = React;

// ===== DATA =====
const CATEGORIES = [
  { id: 'mind', label: 'Mind', icon: '◯', color: '#7B9E87' },
  { id: 'body', label: 'Body', icon: '△', color: '#C4956A' },
  { id: 'work', label: 'Work', icon: '□', color: '#8B9FC5' },
  { id: 'soul', label: 'Soul', icon: '◇', color: '#B8A0C8' },
];

const AFFIRMATIONS = [
  "Small steps compound into transformation.",
  "You showed up today. That matters.",
  "Progress, not perfection.",
  "Each task completed is a promise kept to yourself.",
  "The river doesn't rush. It arrives.",
  "You are building the life you want.",
  "Consistency is quiet power.",
  "Rest is part of the rhythm.",
  "Your only competition is who you were yesterday.",
  "What you do today is shaping tomorrow.",
  "Breathe. Begin. Believe.",
  "Discipline is choosing what you want most over what you want now.",
];

const CELEBRATIONS = ['✦', '❋', '✧', '⟡', '◈', '✺', '⊹', '⋆'];

const getToday = () => new Date().toISOString().split('T')[0];

function load() {
  try { return JSON.parse(localStorage.getItem('zen-todo') || 'null'); } catch { return null; }
}
function save(d) {
  try { localStorage.setItem('zen-todo', JSON.stringify(d)); } catch {}
}

// ===== COMPONENTS =====

function Particles() {
  return h(Fragment, null,
    Array.from({ length: 10 }, (_, i) =>
      h('div', {
        key: i, className: 'particle',
        style: { left: `${8 + i * 9}%`, animationDelay: `${i * 1.8}s` }
      })
    )
  );
}

function Celebration({ onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 1800); return () => clearTimeout(t); }, []);
  return h('div', { className: 'celebration' },
    Array.from({ length: 8 }, (_, i) =>
      h('span', {
        key: i,
        style: {
          animationDelay: `${i * 0.07}s`,
          color: CATEGORIES[i % 4].color,
          transform: `rotate(${i * 45}deg) translateY(-60px)`,
        }
      }, CELEBRATIONS[i])
    )
  );
}

function ProgressRing({ completed, total }) {
  const pct = total === 0 ? 0 : completed / total;
  const r = 34, circ = 2 * Math.PI * r;
  return h('div', { className: 'progress-ring' },
    h('svg', { width: 80, height: 80 },
      h('circle', { cx: 40, cy: 40, r, fill: 'none', stroke: 'rgba(123,158,135,0.1)', strokeWidth: 2.5 }),
      h('circle', { cx: 40, cy: 40, r, fill: 'none', stroke: '#7B9E87', strokeWidth: 2.5,
        strokeDasharray: circ, strokeDashoffset: circ * (1 - pct),
        strokeLinecap: 'round',
        style: { transition: 'stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1)' }
      })
    ),
    h('div', { className: 'count' },
      h('span', { className: 'num' }, completed),
      h('span', { className: 'label' }, `of ${total}`)
    )
  );
}

function TodoItem({ todo, onToggle, onDelete }) {
  const cat = CATEGORIES.find(c => c.id === todo.category) || CATEGORIES[0];
  const startX = useRef(0);
  const currentX = useRef(0);
  const elRef = useRef(null);
  const [showDel, setShowDel] = useState(false);

  const onTouchStart = (e) => {
    startX.current = e.touches[0].clientX;
    currentX.current = 0;
    if (elRef.current) elRef.current.classList.add('swiping');
  };
  const onTouchMove = (e) => {
    const dx = e.touches[0].clientX - startX.current;
    currentX.current = dx;
    if (dx < -20 && elRef.current) {
      elRef.current.style.transform = `translateX(${Math.max(dx, -100)}px)`;
      setShowDel(dx < -50);
    }
  };
  const onTouchEnd = () => {
    if (elRef.current) {
      elRef.current.classList.remove('swiping');
      if (currentX.current < -80) {
        elRef.current.classList.add('removing');
        setTimeout(() => onDelete(todo.id), 350);
      } else {
        elRef.current.style.transform = '';
        setShowDel(false);
      }
    }
  };

  return h('div', {
    ref: elRef,
    className: `todo-item ${todo.done ? 'done' : ''} ${showDel ? 'show-delete' : ''}`,
    style: { '--cat-color': cat.color },
    onClick: () => onToggle(todo.id),
    onTouchStart, onTouchMove, onTouchEnd,
  },
    h('div', { className: 'checkbox' },
      todo.done && h('svg', { width: 12, height: 12, viewBox: '0 0 12 12', fill: 'none' },
        h('path', {
          d: 'M2.5 6L5 8.5L9.5 3.5', stroke: 'white',
          strokeWidth: 1.5, strokeLinecap: 'round', strokeLinejoin: 'round',
        })
      )
    ),
    h('div', { className: 'todo-cat-dot', style: { background: cat.color } }),
    h('span', { className: 'todo-text' }, todo.text),
    h('span', { className: 'delete-hint' }, '← delete')
  );
}

// ===== MAIN APP =====
function App() {
  const stored = load();
  const [todos, setTodos] = useState(stored?.todos || []);
  const [input, setInput] = useState('');
  const [selectedCat, setSelectedCat] = useState('mind');
  const [streak, setStreak] = useState(stored?.streak || 0);
  const [lastComplete, setLastComplete] = useState(stored?.lastComplete || null);
  const [showCelebration, setShowCelebration] = useState(false);
  const [filter, setFilter] = useState('all');
  const [affirmation] = useState(() => AFFIRMATIONS[Math.floor(Math.random() * AFFIRMATIONS.length)]);
  const [deferredPrompt, setDeferredPrompt] = useState(null);
  const [showInstall, setShowInstall] = useState(false);
  const inputRef = useRef(null);

  // Persist
  useEffect(() => { save({ todos, streak, lastComplete }); }, [todos, streak, lastComplete]);

  // Streak logic
  useEffect(() => {
    const today = getToday();
    const todayTodos = todos.filter(t => t.date === today);
    const allDone = todayTodos.length > 0 && todayTodos.every(t => t.done);

    if (allDone && lastComplete !== today) {
      const y = new Date(); y.setDate(y.getDate() - 1);
      const yStr = y.toISOString().split('T')[0];
      setStreak(s => lastComplete === yStr ? s + 1 : 1);
      setLastComplete(today);
      setShowCelebration(true);
    }
  }, [todos]);

  // PWA install
  useEffect(() => {
    const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); setShowInstall(true); };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  const installApp = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    setDeferredPrompt(null);
    setShowInstall(false);
  };

  const addTodo = useCallback(() => {
    const text = input.trim();
    if (!text) return;
    setTodos(prev => [...prev, {
      id: Date.now().toString(), text, category: selectedCat,
      done: false, date: getToday(),
    }]);
    setInput('');
    inputRef.current?.focus();
  }, [input, selectedCat]);

  const toggleTodo = useCallback((id) => {
    setTodos(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));
  }, []);

  const deleteTodo = useCallback((id) => {
    setTodos(prev => prev.filter(t => t.id !== id));
  }, []);

  const today = getToday();
  const todayTodos = todos.filter(t => t.date === today);
  const completed = todayTodos.filter(t => t.done).length;
  const total = todayTodos.length;
  const filtered = filter === 'all' ? todayTodos :
    filter === 'active' ? todayTodos.filter(t => !t.done) :
    todayTodos.filter(t => t.done);

  const now = new Date();
  const greeting = now.getHours() < 12 ? 'Good morning' :
    now.getHours() < 17 ? 'Good afternoon' : 'Good evening';
  const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  const streakIcon = streak >= 7 ? '🌿' : streak >= 3 ? '🌱' : '🫘';

  return h('div', { className: 'app' },
    // Ambient
    h(Particles),
    h('div', { className: 'blob blob-1' }),
    h('div', { className: 'blob blob-2' }),

    showCelebration && h(Celebration, { onDone: () => setShowCelebration(false) }),

    h('div', { className: 'container' },

      // Header
      h('div', { className: 'header' },
        h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' } },
          h('div', null,
            h('p', { className: 'date-label' }, dateStr),
            h('h1', { className: 'greeting' }, greeting)
          ),
          h('div', { className: `streak-badge ${streak > 0 ? '' : 'empty'}` },
            h('span', { className: 'streak-icon' }, streakIcon),
            h('span', null, `${streak} day${streak !== 1 ? 's' : ''}`)
          )
        ),
        h('p', { className: 'affirmation' }, `"${affirmation}"`)
      ),

      // Progress
      h('div', { className: 'progress-card' },
        h(ProgressRing, { completed, total }),
        h('div', { className: 'progress-info' },
          h('p', { className: 'progress-status' },
            total === 0 ? 'Set your intentions for today' :
            completed === total ? 'All intentions fulfilled ✦' :
            `${total - completed} intention${total - completed !== 1 ? 's' : ''} remaining`
          ),
          h('div', { className: 'cat-pills' },
            CATEGORIES.map(cat => {
              const count = todayTodos.filter(t => t.category === cat.id && !t.done).length;
              if (!count) return null;
              return h('div', { key: cat.id, className: 'cat-pill', style: { color: cat.color } },
                h('div', { className: 'cat-pill-dot', style: { background: cat.color } }),
                h('span', null, count)
              );
            })
          )
        ),
        h('div', { className: 'breathing-orb' })
      ),

      // Input
      h('div', { className: 'input-card' },
        h('div', { className: 'cat-selector' },
          CATEGORIES.map(cat =>
            h('button', {
              key: cat.id,
              className: `cat-btn ${selectedCat === cat.id ? 'active' : ''}`,
              style: { '--cat-color': cat.color },
              onClick: () => setSelectedCat(cat.id),
            },
              h('span', { className: 'cat-btn-icon' }, cat.icon),
              ' ' + cat.label
            )
          )
        ),
        h('div', { className: 'input-row' },
          h('input', {
            ref: inputRef,
            className: 'input-field',
            value: input,
            onChange: e => setInput(e.target.value),
            onKeyDown: e => e.key === 'Enter' && addTodo(),
            placeholder: 'Set an intention…',
            enterKeyHint: 'done',
          }),
          h('button', { className: 'add-btn', onClick: addTodo }, 'Add')
        )
      ),

      // Filters
      total > 0 && h('div', { className: 'filters' },
        ['all', 'active', 'done'].map(f =>
          h('button', {
            key: f,
            className: `filter-btn ${filter === f ? 'active' : ''}`,
            onClick: () => setFilter(f),
          }, f)
        )
      ),

      // Todo list
      h('div', { className: 'todo-list' },
        filtered.map((todo, i) =>
          h('div', { key: todo.id, style: { animationDelay: `${i * 0.05}s` } },
            h(TodoItem, { todo, onToggle: toggleTodo, onDelete: deleteTodo })
          )
        )
      ),

      // Empty state
      total === 0 && h('div', { className: 'empty-state' },
        h('div', { className: 'empty-icon' }, '◯'),
        h('p', { className: 'empty-title' }, 'Begin with one small intention'),
        h('p', { className: 'empty-sub' }, 'Organize by mind, body, work, or soul')
      ),

      // Completion card
      total > 0 && completed === total && h('div', { className: 'completion-card' },
        h('p', { className: 'completion-title' }, 'All intentions fulfilled'),
        h('p', { className: 'completion-sub' }, 'You honored your commitments today. Rest well.')
      ),

      // Footer
      h('div', { className: 'footer-orb' },
        h('div', { className: 'breathing-orb', style: { margin: '0 auto' } })
      )
    ),

    // Install banner
    showInstall && h('div', { className: 'install-banner' },
      h('div', { className: 'install-text' },
        h('div', { className: 'install-title' }, 'Install Zen Todo'),
        h('div', { className: 'install-sub' }, 'Add to home screen for a native feel')
      ),
      h('button', { className: 'install-btn', onClick: installApp }, 'Install'),
      h('button', { className: 'install-dismiss', onClick: () => setShowInstall(false) }, '×')
    )
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(App));

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
