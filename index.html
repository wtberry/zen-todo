<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#7B9E87">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="A calming, mindful todo list for daily intentions">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Zen Todo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --sage: #7B9E87; --sage-dark: #5E826A; --sage-light: rgba(123,158,135,0.12); --sage-faint: rgba(123,158,135,0.06);
  --earth: #C4956A; --earth-light: rgba(196,149,106,0.1);
  --sky: #8B9FC5; --lavender: #B8A0C8;
  --text: #3D4A42; --text-soft: #6B7B6E; --text-muted: #8B9E93; --text-faint: #B0B8A8;
  --bg1: #F5F0EB; --bg2: #EDE8E0;
  --glass: rgba(255,255,255,0.55); --glass-border: rgba(255,255,255,0.6);
  --glass-shadow: 0 2px 16px rgba(0,0,0,0.04), 0 1px 4px rgba(0,0,0,0.03);
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'DM Sans', -apple-system, sans-serif;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
  --nav-h: 56px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; -webkit-font-smoothing: antialiased; }
body { min-height: 100%; overflow-x: hidden; font-family: var(--sans); color: var(--text);
  background: linear-gradient(165deg, var(--bg1) 0%, var(--bg2) 50%, #E8E5DD 100%);
  padding-top: var(--safe-top); font-weight: 400; letter-spacing: -0.01em; line-height: 1.5; }

@keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.5); opacity: 0.1; } }
@keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 0; } 8% { opacity: 0.18; } 80% { opacity: 0.03; } 100% { transform: translateY(-85vh) scale(0.3); opacity: 0; } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes checkPop { 0% { transform: scale(0); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
@keyframes checkDraw { from { stroke-dashoffset: 14; } to { stroke-dashoffset: 0; } }
@keyframes gentlePulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.85; } }
@keyframes celebrateBurst { 0% { transform: scale(0) rotate(0); opacity: 1; } 40% { opacity: 1; } 100% { transform: scale(1.8) rotate(200deg); opacity: 0; } }
@keyframes swipeOut { to { transform: translateX(110%); opacity: 0; } }
@keyframes toastIn { from { opacity: 0; transform: translateY(-10px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes toastOut { to { opacity: 0; transform: translateY(-10px) scale(0.96); } }
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes sheetDown { from { transform: translateY(0); } to { transform: translateY(100%); } }
@keyframes fabPop { 0% { transform: scale(0) rotate(-90deg); } 100% { transform: scale(1) rotate(0); } }
@keyframes xpFloat { 0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-40px) scale(0.8); } }
@keyframes levelUpPop { 0% { transform: scale(1); } 30% { transform: scale(1.4) rotate(-10deg); }
  60% { transform: scale(0.9) rotate(5deg); } 100% { transform: scale(1) rotate(0); } }

/* === LAYOUT === */
.app { min-height: 100vh; position: relative; overflow: hidden; padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px); }
.container { max-width: 480px; margin: 0 auto; padding: 20px 18px 24px; position: relative; z-index: 1; }

.particle { position: absolute; bottom: -10px; width: 3px; height: 3px; border-radius: 50%;
  background: rgba(123,158,135,0.13); pointer-events: none; animation: floatUp 13s ease-in infinite; }
.blob { position: absolute; border-radius: 50%; pointer-events: none; animation: breathe 9s ease-in-out infinite; }
.blob-1 { top: -15%; right: -15%; width: 50vw; height: 50vw;
  background: radial-gradient(circle, rgba(123,158,135,0.06) 0%, transparent 70%); }
.blob-2 { bottom: -10%; left: -15%; width: 40vw; height: 40vw;
  background: radial-gradient(circle, rgba(196,149,106,0.04) 0%, transparent 70%); animation-delay: -4s; }

/* === BOTTOM NAV === */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  height: calc(var(--nav-h) + var(--safe-bottom)); padding-bottom: var(--safe-bottom);
  background: rgba(255,255,255,0.88); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid rgba(0,0,0,0.04); display: flex; align-items: stretch;
  box-shadow: 0 -2px 16px rgba(0,0,0,0.03); }
.bottom-nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; border: none; background: transparent; color: var(--text-faint); font-size: 10px;
  letter-spacing: 0.3px; font-family: var(--sans); cursor: pointer; -webkit-appearance: none;
  transition: color 0.25s; min-height: 48px; padding: 6px 0; font-weight: 400; }
.bottom-nav-btn.active { color: var(--sage-dark); font-weight: 500; }
.bottom-nav-icon { font-size: 20px; line-height: 1; transition: transform 0.25s var(--ease-spring); }
.bottom-nav-btn.active .bottom-nav-icon { transform: scale(1.1); }

/* === FAB (Floating Action Button) === */
.fab { position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px); right: 20px; z-index: 110;
  width: 56px; height: 56px; border-radius: 50%; border: none; background: var(--sage); color: white;
  font-size: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer;
  box-shadow: 0 4px 16px rgba(123,158,135,0.35), 0 1px 4px rgba(0,0,0,0.1);
  transition: all 0.3s var(--ease-spring); -webkit-appearance: none;
  animation: fabPop 0.4s var(--ease-spring); }
.fab:active { transform: scale(0.9); background: var(--sage-dark); }
.fab.open { transform: rotate(45deg); background: var(--text-muted); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.fab.open:active { transform: rotate(45deg) scale(0.9); }

/* === BOTTOM SHEET (Input) === */
.sheet-overlay { position: fixed; inset: 0; z-index: 105; background: rgba(0,0,0,0.15);
  backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); animation: fadeIn 0.2s ease-out; }
.sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 106;
  background: var(--bg1); border-radius: 24px 24px 0 0; padding: 20px 20px calc(20px + var(--safe-bottom));
  box-shadow: 0 -8px 40px rgba(0,0,0,0.1); animation: sheetUp 0.35s var(--ease-out);
  max-width: 480px; margin: 0 auto; }
.sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: rgba(0,0,0,0.1);
  margin: 0 auto 18px; }
.sheet-cat-row { display: flex; gap: 8px; margin-bottom: 16px; justify-content: flex-end; }
.sheet-cat-btn { padding: 8px 16px; border-radius: 20px; border: 1.5px solid rgba(0,0,0,0.055);
  background: transparent; color: #999; font-size: 12px; font-family: var(--sans); cursor: pointer;
  transition: all 0.3s var(--ease-spring); -webkit-appearance: none; min-height: 40px; }
.sheet-cat-btn:active { transform: scale(0.93); }
.sheet-cat-btn.active { border-color: var(--cat-color); background: color-mix(in srgb, var(--cat-color) 7%, transparent);
  color: var(--cat-color); box-shadow: 0 0 0 3px color-mix(in srgb, var(--cat-color) 5%, transparent); }
.sheet-input-row { display: flex; gap: 10px; }
.sheet-input { flex: 1; padding: 14px 18px; border-radius: 16px; border: 1.5px solid rgba(0,0,0,0.055);
  background: rgba(255,255,255,0.7); font-size: 15px; font-family: var(--sans); color: var(--text);
  -webkit-appearance: none; }
.sheet-input::placeholder { color: var(--text-faint); font-style: italic; font-weight: 300; }
.sheet-input:focus { outline: none; border-color: rgba(123,158,135,0.3);
  box-shadow: 0 0 0 3px rgba(123,158,135,0.07); }
.sheet-add-btn { padding: 14px 24px; border-radius: 16px; border: none; background: var(--sage); color: white;
  font-size: 14px; font-family: var(--sans); font-weight: 500; cursor: pointer;
  box-shadow: 0 2px 8px rgba(123,158,135,0.2); transition: all 0.3s var(--ease-spring);
  -webkit-appearance: none; min-height: 48px; }
.sheet-add-btn:active { transform: scale(0.94); background: var(--sage-dark); }

/* === HEADER (v2 style, full) === */
.header { margin-bottom: 16px; animation: fadeInUp 0.5s var(--ease-out); }
.date-label { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 6px; }
.greeting { font-family: var(--serif); font-size: 30px; font-weight: 300; color: var(--text);
  line-height: 1.1; letter-spacing: -0.02em; }
.streak-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 16px;
  background: var(--earth-light); font-size: 11px; letter-spacing: 0.3px; color: #8B7B6B;
  box-shadow: 0 1px 3px rgba(196,149,106,0.08); }
.streak-badge.empty { background: rgba(0,0,0,0.02); box-shadow: none; }
.streak-icon { font-size: 13px; }
.streak-badge.empty .streak-icon { filter: grayscale(1) opacity(0.5); }
.affirmation { font-family: var(--serif); font-size: 14px; font-style: italic;
  color: var(--text-muted); animation: gentlePulse 7s ease-in-out infinite;
  margin-top: 12px; }

/* === GROWTH CARD (v2 style) === */
.growth-card { padding: 18px 20px; border-radius: 20px; background: var(--glass); backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px); border: 1px solid var(--glass-border); margin-bottom: 14px;
  animation: fadeInUp 0.5s 0.04s var(--ease-out) both; box-shadow: var(--glass-shadow); }
.growth-top { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
.growth-icon-wrap { position: relative; width: 48px; height: 48px; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; }
.growth-icon { font-size: 28px; transition: all 0.6s var(--ease-spring); line-height: 1; }
.growth-icon.leveling { animation: levelUpPop 0.8s var(--ease-spring); }
.growth-glow { position: absolute; inset: -4px; border-radius: 50%; opacity: 0.15;
  transition: all 0.6s; pointer-events: none; }
.growth-info { flex: 1; }
.growth-level { font-family: var(--serif); font-size: 16px; color: var(--text); font-weight: 400;
  letter-spacing: -0.01em; line-height: 1.2; }
.growth-sublevel { font-size: 10px; color: var(--text-muted); margin-top: 2px; font-weight: 300; }
.growth-xp-row { display: flex; align-items: center; gap: 10px; }
.growth-xp-track { flex: 1; height: 5px; border-radius: 3px; background: rgba(0,0,0,0.04); overflow: hidden; }
.growth-xp-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--sage), #9AB8A4);
  transition: width 0.8s var(--ease-out); position: relative; }
.growth-xp-fill::after { content: ''; position: absolute; right: 0; top: -1px; bottom: -1px; width: 8px;
  background: rgba(255,255,255,0.5); border-radius: 0 3px 3px 0; filter: blur(2px); }
.growth-xp-label { font-size: 10px; color: var(--text-faint); white-space: nowrap; font-weight: 300;
  min-width: 50px; text-align: right; }

/* === PROGRESS CARD === */
.progress-card { display: flex; align-items: center; gap: 18px; padding: 20px; border-radius: 20px;
  background: var(--glass); border: 1px solid var(--glass-border); margin-bottom: 14px;
  animation: fadeInUp 0.5s 0.08s var(--ease-out) both; box-shadow: var(--glass-shadow); }
.progress-ring { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
.progress-ring svg { transform: rotate(-90deg); }
.progress-ring .count { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.progress-ring .num { font-family: var(--serif); font-size: 22px; font-weight: 300; color: var(--text); }
.progress-ring .label { font-size: 7px; letter-spacing: 1.5px; color: var(--text-faint); text-transform: uppercase; }
.progress-info { flex: 1; }
.progress-status { font-size: 13px; color: var(--text-soft); line-height: 1.4; }
.cat-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.cat-pill { display: flex; align-items: center; gap: 4px; font-size: 10px; opacity: 0.6; }
.cat-pill-dot { width: 5px; height: 5px; border-radius: 50%; }

/* === FILTERS (right-aligned) === */
.filters { display: flex; gap: 4px; margin-bottom: 10px; justify-content: flex-end;
  animation: fadeInUp 0.5s 0.12s var(--ease-out) both; }
.filter-btn { padding: 6px 12px; border-radius: 10px; border: none; background: transparent; color: var(--text-faint);
  font-size: 10px; letter-spacing: 0.7px; text-transform: uppercase; font-family: var(--sans); cursor: pointer;
  transition: all 0.3s var(--ease-out); -webkit-appearance: none; min-height: 36px; }
.filter-btn.active { background: var(--sage-light); color: #4A5D52; font-weight: 500; }

/* === TODO ITEMS (checkbox RIGHT) === */
.todo-list { display: flex; flex-direction: column; gap: 8px; }
.todo-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 16px;
  background: rgba(255,255,255,0.68); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.45); transition: all 0.4s cubic-bezier(0.4,0,0.2,1); cursor: pointer;
  position: relative; animation: fadeInUp 0.4s var(--ease-out) both; touch-action: pan-y;
  user-select: none; -webkit-user-select: none; box-shadow: 0 1px 5px rgba(0,0,0,0.025);
  min-height: 52px; }
.todo-item.done { background: var(--sage-faint); border-color: rgba(123,158,135,0.08);
  opacity: 0.45; box-shadow: none; }
.todo-item.swiping { transition: none; }
.todo-item.removing { animation: swipeOut 0.35s var(--ease-out) forwards; }
/* text on LEFT, checkbox on RIGHT */
.todo-cat-dot { width: 5px; height: 5px; border-radius: 50%; opacity: 0.4; flex-shrink: 0; }
.todo-text { flex: 1; font-size: 14px; line-height: 1.4; color: var(--text); }
.todo-item.done .todo-text { color: #A0A89D; text-decoration: line-through;
  text-decoration-color: rgba(123,158,135,0.2); text-decoration-thickness: 1.5px; }
.checkbox { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(0,0,0,0.1);
  display: flex; align-items: center; justify-content: center; transition: all 0.4s var(--ease-spring);
  margin-left: auto; /* push to right */ }
.todo-item.done .checkbox { border-color: var(--cat-color); background: var(--cat-color);
  animation: checkPop 0.35s var(--ease-spring);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--cat-color) 8%, transparent); }
.checkbox svg { stroke-dasharray: 14; stroke-dashoffset: 0; animation: checkDraw 0.3s 0.1s ease-out both; }
.delete-hint { font-size: 10px; color: #C88; letter-spacing: 0.4px; opacity: 0; transition: opacity 0.2s;
  pointer-events: none; position: absolute; right: 16px; font-weight: 300; }
.todo-item.show-delete .delete-hint { opacity: 0.5; }
.todo-item.readonly { cursor: default; opacity: 0.6; }
.todo-item.readonly.done { opacity: 0.35; }

/* === EMPTY STATE === */
.empty-state { text-align: center; padding: 40px 24px; animation: fadeInUp 0.6s 0.2s var(--ease-out) both; }
.empty-icon { font-size: 32px; margin-bottom: 12px; animation: breathe 5s ease-in-out infinite; display: inline-block; }
.empty-title { font-family: var(--serif); font-size: 17px; color: var(--text-muted); font-style: italic; line-height: 1.5; }
.empty-sub { font-size: 11px; color: var(--text-faint); margin-top: 6px; font-weight: 300; }

/* === COMPLETION === */
.completion-card { text-align: center; padding: 24px 20px; margin-top: 12px;
  background: linear-gradient(135deg, rgba(123,158,135,0.05), rgba(196,149,106,0.04));
  border-radius: 18px; border: 1px solid rgba(123,158,135,0.06); animation: fadeInUp 0.6s var(--ease-out); }
.completion-title { font-family: var(--serif); font-size: 18px; color: #4A5D52; font-weight: 300; line-height: 1.5; }
.completion-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; font-weight: 300; }

/* === CELEBRATION === */
.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 999;
  display: flex; align-items: center; justify-content: center; }
.celebration span { position: absolute; font-size: 24px; opacity: 0; animation: celebrateBurst 2s var(--ease-out) forwards; }

/* === HISTORY === */
.date-nav { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 16px;
  animation: fadeInUp 0.5s var(--ease-out); }
/* Left buttons smaller, right buttons bigger for right thumb */
.date-nav-btn { background: rgba(255,255,255,0.45); border: 1px solid rgba(0,0,0,0.05); border-radius: 12px;
  display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted);
  font-size: 16px; transition: all 0.25s var(--ease-out); -webkit-appearance: none; }
.date-nav-btn.sm { width: 36px; height: 36px; }
.date-nav-btn.lg { width: 44px; height: 44px; font-size: 18px; }
.date-nav-btn:active { background: var(--sage-light); transform: scale(0.94); }
.date-nav-btn:disabled { opacity: 0.2; cursor: default; }
.date-nav-btn:disabled:active { transform: none; background: rgba(255,255,255,0.45); }
.date-nav-label { font-family: var(--serif); font-size: 16px; color: var(--text); font-weight: 400;
  flex: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.week-strip { display: flex; gap: 3px; margin-bottom: 18px; animation: fadeInUp 0.5s 0.06s var(--ease-out) both; }
.week-day { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 8px 2px; border-radius: 12px; cursor: pointer; transition: all 0.3s var(--ease-out);
  border: 1.5px solid transparent; -webkit-appearance: none; background: none; min-height: 48px; }
.week-day:active { transform: scale(0.94); }
.week-day.selected { background: rgba(255,255,255,0.65); border-color: var(--sage);
  box-shadow: 0 2px 6px rgba(123,158,135,0.08); }
.week-day.today:not(.selected) { border-color: rgba(123,158,135,0.18); }
.week-day-name { font-size: 8px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-faint); }
.week-day-num { font-family: var(--serif); font-size: 15px; color: var(--text-muted); font-weight: 400; }
.week-day.selected .week-day-num { color: var(--text); font-weight: 500; }
.week-day-dot { width: 4px; height: 4px; border-radius: 50%; }
.week-day-dot.all-done { background: var(--sage); box-shadow: 0 0 3px rgba(123,158,135,0.25); }
.week-day-dot.partial { background: var(--earth); }
.week-day-dot.empty { background: transparent; }

.past-day-header { text-align: center; margin-bottom: 16px; animation: fadeInUp 0.5s var(--ease-out); }
.past-day-title { font-family: var(--serif); font-size: 20px; color: var(--text); font-weight: 300; }
.past-day-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight: 300; }

/* === INSIGHTS CARDS === */
.insights-card { padding: 20px; border-radius: 18px; background: var(--glass); backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px); border: 1px solid var(--glass-border);
  margin-bottom: 16px; animation: fadeInUp 0.5s 0.08s var(--ease-out) both; box-shadow: var(--glass-shadow); }
.insights-title { font-family: var(--serif); font-size: 17px; color: var(--text); margin-bottom: 14px; font-weight: 400; }
.insights-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.insight-item { text-align: center; }
.insight-num { font
